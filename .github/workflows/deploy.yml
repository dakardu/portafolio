name: Build & Publish Portafolio

on:
    push:
        branches:
            - main

permissions:
    contents: read
    packages: write

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Login GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Pull Reverse Proxy
              run: |
                  docker pull ghcr.io/${{ github.repository_owner }}/reverse-proxy:latest

            - name: Build Backend
              run: |
                  docker build \
                    -t ghcr.io/${{ github.repository_owner }}/portafolio-backend:latest \
                    ./backend

            - name: Push Backend
              run: |
                  docker push ghcr.io/${{ github.repository_owner }}/portafolio-backend:latest

            - name: Build Frontend
              run: |
                  docker build \
                    -t ghcr.io/${{ github.repository_owner }}/portafolio-frontend:latest \
                    ./frontend

            - name: Push Frontend
              run: |
                  docker push ghcr.io/${{ github.repository_owner }}/portafolio-frontend:latest
